# Dogfood gate — Scout verifies the Scout marketing site, on the real deploy.
#
# Deliverable #2 of the marketing-site track (plan #435): Scout replays the
# Lab's own `.scout.md` suite against the immutable Vercel deployment as a
# BLOCKING gate, then on a production-bound (main) deploy promotes the same
# bytes to production — no rebuild.
#
# ── How it is wired ───────────────────────────────────────────────────────────
# Trigger: Vercel posts a GitHub `deployment_status` for every deploy. We act on
# the `success` ones and replay against `target_url` (the immutable URL of that
# exact build). Replay is `scout go --no-heal`: deterministic, ZERO LLM, no API
# key. The committed scripts under packages/site/.scout/scripts/lab/*.json are
# the source of truth (recorded once; navigate steps are base-relative).
#
# ── Security model (deployment_status runs the DEFAULT-branch workflow with full
#    repo secrets, against an arbitrary deployment SHA) ───────────────────────
# To keep untrusted code away from high-value secrets, the work is split:
#   • `gate` runs the checked-out SHA (npm ci + build + replay). It holds ONLY
#     the low-value bypass secret (it merely views a pre-launch preview), runs
#     `npm ci --ignore-scripts` (no install lifecycle hooks), and has a
#     READ-ONLY GITHUB_TOKEN. No VERCEL_TOKEN, no write token here.
#   • `promote` runs ONLY on trusted main deploys, needs `gate`, and holds the
#     severe secrets (VERCEL_TOKEN, write GITHUB_TOKEN). It executes NO checked-
#     out code — no SHA checkout, no `npm ci` — only an artifact download + git
#     push + `npx vercel promote`. So a malicious SHA can never reach them.
# This also relies on Vercel's Git Fork Protection (default ON): fork-PR
# previews are not auto-deployed, so an untrusted SHA never reaches a `success`
# deployment_status without per-deploy maintainer authorization.
#
# ── Maintainer one-time setup ─────────────────────────────────────────────────
#   • vercel.json sets `github.autoAlias: false` so a main merge builds but does
#     NOT auto-publish to prod; this workflow promotes the gated build instead
#     (no double deploy).
#   • Repository secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID (promote)
#     and VERCEL_AUTOMATION_BYPASS_SECRET (gate — Vercel → Settings → Deployment
#     Protection → Protection Bypass for Automation). Treat the bypass secret as
#     low-sensitivity and rotate it at launch.
name: dogfood

on:
  deployment_status:

# Minimal by default; only the promote job widens to contents: write.
permissions:
  contents: read

concurrency:
  group: dogfood-${{ github.event.deployment_status.target_url }}
  cancel-in-progress: true

jobs:
  gate:
    # Only successful deploys carry a usable URL. Skip pending/error/failure.
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read # runs the untrusted SHA — no write power, no severe secrets
    outputs:
      # Whether this deploy is the current tip of main (the production-bound one).
      # Vercel labels every deploy `environment=Preview` and sets the GitHub
      # deployment `ref` to the SHA (not "main") — with autoAlias:false there is
      # no "Production" env to key on — so we resolve it by comparing the deploy
      # SHA to main's HEAD. Computed in this read-only job; the promote job keys
      # its severe-secret work on this output.
      is_main: ${{ steps.detect.outputs.is_main }}
    env:
      # The immutable URL of the exact build Vercel just finished.
      SCOUT_BASE_URL: ${{ github.event.deployment_status.target_url }}
      # The Lab's environment-interpolation surface resolves $ENV:LAB_COUPON.
      LAB_COUPON: FOCUS25
    steps:
      - name: Is this deploy the current tip of main?
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq .sha)"
          deploy_sha="${{ github.event.deployment.sha }}"
          if [ "$main_sha" = "$deploy_sha" ]; then is_main=true; else is_main=false; fi
          echo "deploy=$deploy_sha main=$main_sha is_main=$is_main"
          echo "is_main=$is_main" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # --ignore-scripts: do not run install lifecycle hooks from the checked-out
      # SHA. The CLI build is tsc and the replay browser is installed explicitly
      # below, so nothing here needs postinstall (Vercel builds the site the same
      # way). Keeps an untrusted SHA from running install-time code.
      - run: npm ci --ignore-scripts

      - name: Build the Scout CLI
        run: npm run build -w @pcamarajr/scout

      - name: Install the replay browser
        run: npx playwright install --with-deps chromium
        working-directory: packages/cli

      - name: Preflight — the bypass header reaches the app, not the 401 wall
        # A protected deploy returns 401 "Authentication Required" inline when
        # the bypass secret is missing/wrong; without this guard the replay just
        # times out on every click against the challenge page. Fail fast instead.
        env:
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          code="$(curl -s -o /dev/null -w '%{http_code}' \
            -H "x-vercel-protection-bypass: $BYPASS" \
            "$SCOUT_BASE_URL/lab/")"
          echo "GET /lab/ → HTTP $code"
          if [ "$code" = "401" ] || [ "$code" = "403" ]; then
            echo "::error::Deploy is protected and the bypass was rejected. Set the VERCEL_AUTOMATION_BYPASS_SECRET repo secret (Vercel → Settings → Deployment Protection → Protection Bypass for Automation)."
            exit 1
          fi

      - name: Replay the Lab suite against the deploy (no LLM)
        id: replay
        continue-on-error: true # capture the verdict; the gate step decides pass/fail
        working-directory: packages/site
        # Scout sends the bypass header so it reaches the app instead of the login
        # wall; the cookie variant covers popups/new tabs. Requires the CLI header
        # support (SCOUT_EXTRA_HEADERS) shipped in #41.
        env:
          SCOUT_EXTRA_HEADERS: >-
            {"x-vercel-protection-bypass":"${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}","x-vercel-set-bypass-cookie":"true"}
        run: node ../cli/dist/cli.js go --no-heal

      - name: Build the verdict report
        if: always()
        working-directory: packages/site
        run: |
          node ../cli/dist/cli.js report --json > verdicts.json
          {
            echo "## 🔭 Scout dogfood — replay against \`$SCOUT_BASE_URL\`"
            echo
            node ../cli/dist/cli.js report
          } >> "$GITHUB_STEP_SUMMARY"

      # Hand the verdicts to the promote job, which never touches the SHA's code.
      - name: Upload the verdict report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verdicts
          path: packages/site/verdicts.json
          retention-days: 7

      - name: Gate — fail if any scenario is not verified
        working-directory: packages/site
        run: node ../cli/dist/cli.js report --check

  # Trusted job: severe secrets live here, and it runs NO checked-out code.
  publish-and-promote:
    needs: gate
    # main-tip deploys only; runs even if the gate failed (to publish a red
    # board), but promote is gated on the gate passing (see the promote step).
    if: ${{ !cancelled() && needs.gate.outputs.is_main == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the orphan `verdicts` branch
    env:
      SCOUT_BASE_URL: ${{ github.event.deployment_status.target_url }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Download the verdict report
        uses: actions/download-artifact@v4
        with:
          name: verdicts
          path: .

      - name: Publish the public board
        # No SHA checkout, no npm — just the artifact + a force-pushed orphan
        # branch the Lab island reads. Runs green or red, so the public board
        # reflects the latest main result.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tmp="$(mktemp -d)"
          cp verdicts.json "$tmp/verdicts.json"
          cd "$tmp"
          git init -q
          git checkout -q -b verdicts
          git add verdicts.json
          git -c user.email='github-actions[bot]@users.noreply.github.com' \
              -c user.name='github-actions[bot]' \
              commit -qm "chore(verdicts): ${GITHUB_SHA::12} on $(date -u +%FT%TZ)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" verdicts

      - name: Promote the gated build to production (on green)
        if: needs.gate.result == 'success' && env.VERCEL_TOKEN != ''
        # --scope is required: `vercel promote <url>` does NOT inherit the team
        # from VERCEL_ORG_ID the way `vercel pull` does, so it defaults to the
        # token's personal account and fails with "Deployment belongs to a
        # different team". Pin the scope to the project's team explicitly.
        run: npx vercel promote "$SCOUT_BASE_URL" --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --yes
