name: release-please

# Two responsibilities live in ONE file on purpose: npm Trusted Publishing binds
# a single workflow filename per package (it matches the OIDC claim against the
# exact file), so the @next release-candidate publish must share this already-
# trusted workflow rather than live in its own. No second trusted-publisher entry
# is possible — keep both publish jobs here.
on:
  push:
    branches: [main]
  pull_request:
    types: [labeled]
  # Manual re-publish escape hatch: if the automated publish is ever missed
  # (e.g. a skipped `publish` job), dispatch this workflow on `main` to publish
  # the version currently in packages/cli/package.json to npm via OIDC.
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # --- @latest release pipeline (push to main only) ---
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      # Manifest/monorepo mode (release-please-config.json + manifest present)
      # emits PATH-PREFIXED outputs, not the bare `release_created`/`tag_name`.
      # Reading the bare names silently yields empty strings, which skips the
      # publish job — exactly what swallowed the 0.9.0 npm release.
      release_created: ${{ steps.release.outputs['packages/cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['packages/cli--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release

  publish:
    needs: release-please
    # Auto on a real `latest` release, or manually via workflow_dispatch (the
    # re-publish escape hatch). `!cancelled()` lets dispatch run even though the
    # release-please job is skipped on that event (a skipped need would otherwise
    # skip this job too).
    if: >-
      ${{ !cancelled() &&
        (github.event_name == 'workflow_dispatch' ||
         (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # npm >= 11.5.1 required for OIDC trusted publishing
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm publish --access public --provenance
        working-directory: packages/cli

  # --- @next release-candidate publish (label-gated, on the release PR) ---
  # Add the `publish-next` label to a PR (typically the release-please release
  # PR) to publish its build to the npm `@next` dist-tag as `<base>-next.<sha>`.
  # A distinct prerelease version, so it never collides with the eventual bare
  # `latest` release. `latest` stays the merge-the-release-PR path, untouched.
  # Only maintainers can add labels, so labelling is the authorization gate.
  publish-next:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'publish-next')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # npm >= 11.5.1 required for OIDC trusted publishing
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Compute a distinct prerelease version so it never collides with the
      # `latest` release. Modifies package.json in CI only (uncommitted).
      - name: Compute and publish prerelease
        id: publish
        working-directory: packages/cli
        run: |
          BASE=$(node -p "require('./package.json').version")
          SHORT=${GITHUB_SHA::7}
          VERSION="${BASE}-next.${SHORT}"
          npm version "$VERSION" --no-git-tag-version
          npm publish --tag next --access public --provenance
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Comment install command on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = "${{ steps.publish.outputs.version }}";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                `Published prerelease \`@pcamarajr/scout@${version}\` to the \`next\` dist-tag.`,
                "",
                "Install the latest `@next` build with:",
                "",
                "```sh",
                "npm i @pcamarajr/scout@next",
                "```",
              ].join("\n"),
            });
